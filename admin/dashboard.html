<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ayusomam Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
.header h1{font-size:1.3rem;color:#10b981}
.header .stats{display:flex;gap:1.5rem}
.stat-box{background:#334155;padding:0.5rem 1rem;border-radius:8px;text-align:center}
.stat-box .num{font-size:1.5rem;font-weight:700;color:#10b981}
.stat-box .label{font-size:0.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;gap:0;background:#1e293b;border-bottom:1px solid #334155}
.tab{padding:0.8rem 1.5rem;cursor:pointer;font-size:0.9rem;color:#94a3b8;border-bottom:2px solid transparent;transition:all 0.2s}
.tab:hover{color:#e2e8f0}
.tab.active{color:#10b981;border-bottom-color:#10b981;font-weight:600}
.content{padding:1.5rem}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{background:#1e293b;padding:0.8rem;text-align:left;color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:0.75rem;letter-spacing:0.5px}
td{padding:0.7rem 0.8rem;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b}
.badge{padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:600}
.badge-new{background:#10b98120;color:#10b981}
.badge-wa{background:#25d36620;color:#25d366}
.badge-ig{background:#e040fb20;color:#e040fb}
.badge-web{background:#3b82f620;color:#3b82f6}
.badge-paid{background:#f59e0b20;color:#f59e0b}
.view-btn{background:#334155;color:#e2e8f0;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem}
.view-btn:hover{background:#475569}
.chat-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center}
.chat-modal.show{display:flex}
.chat-box{background:#1e293b;border-radius:12px;width:500px;max-width:90vw;max-height:80vh;overflow:hidden;display:flex;flex-direction:column}
.chat-header{padding:1rem;background:#0f172a;display:flex;justify-content:space-between;align-items:center}
.chat-header h3{color:#10b981;font-size:1rem}
.chat-close{background:none;border:none;color:#94a3b8;font-size:1.5rem;cursor:pointer}
.chat-body{padding:1rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:0.5rem;max-height:60vh}
.msg{padding:0.6rem 0.8rem;border-radius:8px;max-width:85%;font-size:0.85rem;line-height:1.5}
.msg-user{background:#334155;align-self:flex-end;color:#e2e8f0}
.msg-bot{background:#10b98120;align-self:flex-start;color:#e2e8f0;border-left:3px solid #10b981}
.msg-time{font-size:0.65rem;color:#64748b;margin-top:2px}
.empty{text-align:center;padding:3rem;color:#64748b}
.loading{text-align:center;padding:3rem;color:#10b981}
.search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:0.5rem 1rem;border-radius:6px;font-size:0.85rem;width:300px;margin-bottom:1rem}
.search:focus{outline:none;border-color:#10b981}
@media(max-width:768px){.header{flex-direction:column;gap:1rem}.header .stats{flex-wrap:wrap}.search{width:100%}table{font-size:0.75rem}th,td{padding:0.5rem}}
</style>
</head>
<body>
<div class="header"><h1>Ayusomam Admin</h1><div class="stats"><div class="stat-box"><div class="num" id="totalLeads">-</div><div class="label">Leads</div></div><div class="stat-box"><div class="num" id="totalMembers">-</div><div class="label">Members</div></div><div class="stat-box"><div class="num" id="totalPayments">-</div><div class="label">Payments</div></div></div></div>
<div class="tabs"><div class="tab active" onclick="showTab('leads')">Leads</div><div class="tab" onclick="showTab('members')">Members</div><div class="tab" onclick="showTab('payments')">Payments</div></div>
<div class="content"><input class="search" id="search" placeholder="Search..." oninput="filterTable()"><div id="tableWrap"><div class="loading">Loading...</div></div></div>
<div class="chat-modal" id="chatModal"><div class="chat-box"><div class="chat-header"><h3 id="chatName">Chat</h3><button class="chat-close" onclick="closeChat()">X</button></div><div class="chat-body" id="chatBody"></div></div></div>
<script>
const KEY=new URLSearchParams(window.location.search).get('key');let DATA={leads:[],members:[],payments:[]};let currentTab='leads';
function parseDate(v){if(!v)return null;if(typeof v==='string')return new Date(v);if(v._seconds!==undefined)return new Date(v._seconds*1000);if(v.seconds!==undefined)return new Date(v.seconds*1000);return new Date(v);}
async function loadData(){try{const r=await fetch('/admin/data?key='+KEY);DATA=await r.json();document.getElementById('totalLeads').textContent=DATA.leads?DATA.leads.length:0;document.getElementById('totalMembers').textContent=DATA.members?DATA.members.length:0;document.getElementById('totalPayments').textContent=DATA.payments?DATA.payments.length:0;showTab('leads');}catch(e){document.getElementById('tableWrap').innerHTML='<div class="empty">Error: '+e.message+'</div>';}}
function showTab(tab){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.toLowerCase()===tab)t.classList.add('active');});renderTable();}
function renderTable(){const wrap=document.getElementById('tableWrap');const items=DATA[currentTab]||[];if(!items.length){wrap.innerHTML='<div class="empty">No '+currentTab+' yet</div>';return;}let html='<table><thead><tr>';if(currentTab==='leads'){html+='<th>Name</th><th>Phone</th><th>Platform</th><th>Status</th><th>Last Msg</th><th>Date</th><th>Chat</th>';}else if(currentTab==='members'){html+='<th>Name</th><th>Phone</th><th>Email</th><th>Plan</th><th>Amount</th><th>Joined</th>';}else{html+='<th>Name</th><th>Email</th><th>Phone</th><th>Plan</th><th>Amount</th><th>Status</th><th>Date</th>';}html+='</tr></thead><tbody>';items.forEach(function(item){if(currentTab==='leads'){var p=item.platform||item.source||'unknown';var bc=p.includes('whatsapp')?'badge-wa':p.includes('instagram')?'badge-ig':'badge-web';html+='<tr><td><strong>'+(item.name||'Unknown')+'</strong></td><td>'+(item.phone||item.id||'-')+'</td><td><span class="badge '+bc+'">'+p+'</span></td><td><span class="badge badge-new">'+(item.status||'new')+'</span></td><td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(item.lastMessage||'-')+'</td><td>'+(item.createdAt?parseDate(item.createdAt).toLocaleDateString():'')+'</td><td><button class="view-btn" onclick="viewChat(\''+item.id+'\',\''+(item.name||'Lead').replace(/'/g,'')+'\')">View</button></td></tr>';}else if(currentTab==='members'){html+='<tr><td><strong>'+(item.name||'-')+'</strong></td><td>'+(item.phone||'-')+'</td><td>'+(item.email||'-')+'</td><td><span class="badge badge-paid">'+(item.plan||'-')+'</span></td><td>Rs.'+(item.amount||0)+'</td><td>'+(item.createdAt?parseDate(item.createdAt).toLocaleDateString():'')+'</td></tr>';}else{html+='<tr><td><strong>'+(item.name||'-')+'</strong></td><td>'+(item.email||'-')+'</td><td>'+(item.phone||'-')+'</td><td>'+(item.plan||'-')+'</td><td>Rs.'+(item.amount||0)+'</td><td><span class="badge badge-paid">'+(item.status||'-')+'</span></td><td>'+(item.createdAt?parseDate(item.createdAt).toLocaleDateString():'')+'</td></tr>';}});html+='</tbody></table>';wrap.innerHTML=html;}
function filterTable(){var q=document.getElementById('search').value.toLowerCase();document.querySelectorAll('tbody tr').forEach(function(row){row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';});}
async function viewChat(uid,name){document.getElementById('chatName').textContent=name+' - Chat';var body=document.getElementById('chatBody');body.innerHTML='<div class="loading">Loading...</div>';document.getElementById('chatModal').classList.add('show');try{var r=await fetch('/admin/lead/'+uid+'/history?key='+KEY);var msgs=await r.json();if(!msgs.length){body.innerHTML='<div class="empty">No messages</div>';return;}body.innerHTML='';msgs.forEach(function(m){var div=document.createElement('div');div.className='msg '+(m.role==='user'?'msg-user':'msg-bot');div.innerHTML=m.content+'<div class="msg-time">'+(m.timestamp?parseDate(m.timestamp).toLocaleString():'')+'</div>';body.appendChild(div);});body.scrollTop=body.scrollHeight;}catch(e){body.innerHTML='<div class="empty">Error: '+e.message+'</div>';}}
function closeChat(){document.getElementById('chatModal').classList.remove('show');}
document.getElementById('chatModal').addEventListener('click',function(e){if(e.target.id==='chatModal')closeChat();});
loadData();
</script>
</body>
</html>
