services:
  - type: web
    name: ayusom-webhook
    runtime: node
    repo: https://github.com/sachink117/ayusom-webhook
    branch: main
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: npm start
    plan: starter
    autoDeploy: true
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SHEET_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: INSTAGRAM_USERNAME
        sync: false
      - key: INSTAGRAM_PASSWORD
        sync: false
